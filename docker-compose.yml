services:
  db:
    image: pgvector/pgvector:pg16
    container_name: booklet-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: booklet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booklet"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: booklet-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: alpine/ollama:latest
    container_name: booklet-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: booklet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: booklet-grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: booklet-dozzle
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booklet-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_ENV=development # Remove or change to 'production' in non-development deployments
      - DATABASE_URL=postgres://postgres:postgres@db:5432/booklet?sslmode=disable
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - MINIO_BUCKET=booklet
      - EMBEDDING_PROVIDER=mock # Change to 'ollama' for real embeddings
      - EMBEDDING_DIMENSION=384
      - OLLAMA_HOST=http://ollama:11434
      - FRONTEND_URL=http://localhost
      - ALLOWED_ORIGINS=http://localhost,http://localhost:5173,http://127.0.0.1,http://127.0.0.1:5173
      - MAX_PARALLEL_DOCUMENTS=5
      - SPLIT_CHUNK_SIZE=100
      - PAGE_PARSING_TIMEOUT_SECONDS=5
      - GODEBUG=madvdontneed=1
      - ADMIN_API_KEY=dev-admin-key
      - SMTP_HOST= # Leave empty to disable fallback or specify e.g. smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=
      - SMTP_PASSWORD=
      - SMTP_ENCRYPTION=starttls # none, ssl, starttls
      - SMTP_FROM_EMAIL=noreply@booklet.local
      - SMTP_FROM_NAME=Booklet Studio
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Must mirror APP_ENV on the backend: set to true when APP_ENV=development,
        # remove or set to false for production deployments.
        VITE_DEV_BYPASS_ENABLED: "true"
        APP_ENV: "development"
    container_name: booklet-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  grafana_data:
